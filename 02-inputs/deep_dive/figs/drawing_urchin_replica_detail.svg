<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="brass" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f6dd87"/>
      <stop offset="55%" stop-color="#c69a2c"/>
      <stop offset="100%" stop-color="#6f4d0e"/>
    </radialGradient>
    <radialGradient id="brassPellet" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f6e9b0"/>
      <stop offset="65%" stop-color="#d9af36"/>
      <stop offset="100%" stop-color="#705412"/>
    </radialGradient>
    <pattern id="goldFinish" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="#b88a25"/>
      <circle cx="1.5" cy="1.5" r="0.5" fill="#e0b545"/>
    </pattern>
    <marker id="arrU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="dotU" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="6" markerHeight="6">
      <circle cx="3" cy="3" r="2.2" fill="#222"/>
    </marker>
  </defs>

  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#111">Po-Be "Urchin" initiator — replica detail (3× actual size)</text>
  <text x="700" y="65" text-anchor="middle" font-size="14" fill="#555">20 mm OD brass shell · 6 mm wall · 8 mm inner pellet · 15 latitudinal wedge grooves · gold-painted exterior</text>

  <!-- =========== LEFT: EQUATORIAL CROSS-SECTION =========== -->
  <text x="350" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="#333">View A — Equatorial cross-section</text>

  <!-- Outer shell (20mm * 15 = 300 px diameter, r=150) -->
  <circle cx="350" cy="450" r="150" fill="url(#brass)" stroke="#5a3e08" stroke-width="2"/>
  <!-- Inner cavity (where pellet sits) - 8mm wall thickness means inner radius = 150 - 6mm*15 = 150-90 = 60 -->
  <!-- Wait: 6mm wall, 20mm OD = 8mm ID. Inner radius = 4mm scaled = 60px. OK -->
  <circle cx="350" cy="450" r="60" fill="#fff8e6" stroke="#5a3e08" stroke-width="1"/>

  <!-- 15 wedge grooves on inner surface — radiating from inner cavity edge outward into wall depth -->
  <!-- Show wedge marks as triangular notches on inner surface -->
  <g fill="#3a280a" stroke="#3a280a" stroke-width="0.5">
    <!-- 15 groove triangles around inner circle (radius 60), pointing outward to wall depth 12 px (1mm deep at equator) -->
    <g transform="translate(350,450)">
      <!-- 15 wedges evenly around -->
      <g transform="rotate(0)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(24)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(48)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(72)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(96)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(120)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(144)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(168)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(192)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(216)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(240)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(264)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(288)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(312)"><polygon points="0,-60 -5,-72 5,-72" /></g>
      <g transform="rotate(336)"><polygon points="0,-60 -5,-72 5,-72" /></g>
    </g>
  </g>

  <!-- Inner pellet (8mm * 15 = 120 dia, r=60... wait that's the same as cavity) -->
  <!-- 8mm pellet in 8mm cavity is press-fit. Let me show 7.5mm pellet for visibility — r=56 -->
  <circle cx="350" cy="450" r="56" fill="url(#brassPellet)" stroke="#5a3e08" stroke-width="0.8"/>

  <!-- Cross-pin -->
  <line x1="350" y1="300" x2="350" y2="600" stroke="#5a3e08" stroke-width="2.5"/>
  <circle cx="350" cy="450" r="5" fill="#705412" stroke="#5a3e08" stroke-width="0.5"/>

  <!-- Equatorial split (the brass shell is bisected, so a horizontal line shows the split mating face) -->
  <line x1="200" y1="450" x2="500" y2="450" stroke="#fff" stroke-width="2"/>
  <line x1="200" y1="450" x2="500" y2="450" stroke="#111" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Dimension callouts -->
  <g stroke="#222" stroke-width="0.9" font-size="11" fill="#222">
    <!-- OD -->
    <line x1="200" y1="645" x2="500" y2="645" marker-start="url(#arrU)" marker-end="url(#arrU)"/>
    <text x="350" y="664" text-anchor="middle">20 mm Ø outer shell</text>
    <!-- Wall thickness -->
    <line x1="200" y1="450" x2="290" y2="450" marker-start="url(#arrU)" marker-end="url(#arrU)" stroke="#fff" stroke-width="1.5"/>
    <line x1="200" y1="450" x2="290" y2="450" marker-start="url(#arrU)" marker-end="url(#arrU)"/>
    <text x="245" y="442" text-anchor="middle" font-size="10">6 mm wall</text>
    <!-- Inner pellet -->
    <line x1="294" y1="450" x2="406" y2="450" stroke="#fff" stroke-width="1.5"/>
    <line x1="294" y1="450" x2="406" y2="450" stroke="#222" stroke-width="0.7" stroke-dasharray="2,2"/>
    <text x="350" y="442" text-anchor="middle" font-size="10" fill="#fff" stroke="#222" stroke-width="0.2">8 mm Ø pellet</text>
  </g>

  <!-- Callout labels (left side) -->
  <g font-size="13" fill="#111">
    <line x1="350" y1="300" x2="50" y2="160" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="45" y="148" text-anchor="end">A — Outer shell (Be in original)</text>
    <text x="45" y="164" text-anchor="end">      replica: 360 brass, 20 mm sphere</text>
    <text x="45" y="180" text-anchor="end">      gloss-gold paint exterior</text>

    <line x1="280" y1="490" x2="50" y2="280" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="45" y="278" text-anchor="end">B — Inner-shell wedge groove (×15)</text>
    <text x="45" y="294" text-anchor="end">      latitudinal, 60° threading-tool cut</text>
    <text x="45" y="310" text-anchor="end">      1 mm deep @ equator → 0 @ pole</text>

    <line x1="200" y1="450" x2="50" y2="450" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="45" y="448" text-anchor="end">C — Equatorial split (lathe parted)</text>
    <text x="45" y="464" text-anchor="end">      bright brass mating face</text>

    <line x1="295" y1="450" x2="50" y2="580" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="45" y="578" text-anchor="end">D — Inner Be pellet (replica: brass ball)</text>
    <text x="45" y="594" text-anchor="end">      polished, no paint — represents the</text>
    <text x="45" y="610" text-anchor="end">      Po-coated 8 mm Be sphere in original</text>

    <line x1="350" y1="450" x2="50" y2="700" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="45" y="698" text-anchor="end">E — 1.5 mm brass cross-pin</text>
    <text x="45" y="714" text-anchor="end">      epoxy-bonded; centers pellet in shell</text>
  </g>

  <!-- =========== RIGHT: POLAR VIEW =========== -->
  <text x="1080" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="#333">View B — Polar elevation (assembled, exterior)</text>

  <!-- Outer assembled sphere -->
  <circle cx="1080" cy="450" r="150" fill="url(#brass)" stroke="#5a3e08" stroke-width="2"/>

  <!-- Equator visible as a fine line (the seam) -->
  <line x1="930" y1="450" x2="1230" y2="450" stroke="#5a3e08" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Cross-pin head visible at top and bottom -->
  <circle cx="1080" cy="300" r="4" fill="#705412" stroke="#5a3e08" stroke-width="0.5"/>
  <circle cx="1080" cy="600" r="4" fill="#705412" stroke="#5a3e08" stroke-width="0.5"/>

  <!-- Highlight to suggest gold paint sheen -->
  <ellipse cx="1040" cy="395" rx="35" ry="22" fill="#fff" opacity="0.3"/>

  <!-- Callouts -->
  <g font-size="13" fill="#111">
    <line x1="1080" y1="300" x2="1340" y2="200" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="1345" y="198" text-anchor="start">Pole — visible end of cross-pin</text>
    <text x="1345" y="214" text-anchor="start">(filed flush with shell after epoxy cure)</text>

    <line x1="1228" y1="455" x2="1340" y2="450" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="1345" y="448" text-anchor="start">Equatorial seam — barely visible</text>
    <text x="1345" y="464" text-anchor="start">after lapping + gold-paint masking pass</text>

    <line x1="1040" y1="395" x2="1340" y2="350" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="1345" y="348" text-anchor="start">Testor's metallic gold gloss</text>
    <text x="1345" y="364" text-anchor="start">+ Brasso polish — soft glow</text>

    <line x1="1080" y1="600" x2="1340" y2="650" stroke="#222" stroke-width="1" marker-start="url(#dotU)"/>
    <text x="1345" y="648" text-anchor="start">Wedge grooves NOT visible from outside</text>
    <text x="1345" y="664" text-anchor="start">(internal only — see View A)</text>
  </g>

  <!-- =========== BOTTOM: ORIGINAL vs REPLICA COMPARISON =========== -->
  <g transform="translate(0,770)">
    <rect x="35" y="0" width="1330" height="160" fill="#fafafa" stroke="#888" stroke-width="0.7"/>
    <text x="50" y="22" font-size="14" font-weight="700" fill="#111">Original (1945, classified) vs. this replica</text>

    <g font-size="12" fill="#222">
      <!-- Header row -->
      <text x="50" y="48" font-weight="700">Feature</text>
      <text x="380" y="48" font-weight="700">Original Urchin (Po-Be initiator)</text>
      <text x="800" y="48" font-weight="700">This replica</text>
      <text x="1130" y="48" font-weight="700">Notes</text>
      <line x1="50" y1="55" x2="1330" y2="55" stroke="#aaa"/>

      <text x="50" y="72">Outer shell</text>
      <text x="380" y="72">Beryllium, 20 mm OD, 6 mm wall</text>
      <text x="800" y="72">360 brass, 20 mm OD, 6 mm wall</text>
      <text x="1130" y="72">Same geometry, safe material</text>

      <text x="50" y="90">Inner pellet</text>
      <text x="380" y="90">Be sphere coated Ni + Au-Po layer</text>
      <text x="800" y="90">Brass ball, 8 mm Ø, polished</text>
      <text x="1130" y="90">No Po — Brasso glow stands in</text>

      <text x="50" y="108">Wedge grooves</text>
      <text x="380" y="108">15 latitudinal, Po-filled, ~1 mm deep</text>
      <text x="800" y="108">15 latitudinal, lathe-cut, ~1 mm deep</text>
      <text x="1130" y="108">Identical pattern; left brass-bright</text>

      <text x="50" y="126">Mass</text>
      <text x="380" y="126">~7 g total assembly</text>
      <text x="800" y="126">~75 g (brass is 4.3× density of Be)</text>
      <text x="1130" y="126">Mass not visible; geometry is</text>

      <text x="50" y="144">Function</text>
      <text x="380" y="144">10⁹ neutrons/µs on implosion shock</text>
      <text x="800" y="144">Inert display only</text>
      <text x="1130" y="144">No Po-210; no radioactivity</text>
    </g>
  </g>
</svg>
